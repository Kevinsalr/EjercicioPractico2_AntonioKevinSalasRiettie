<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Eventos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="d-flex justify-content-between mb-3">
        <h2>Lista de Eventos</h2>

        <!-- SOLO ADMIN Y ORGANIZADOR -->
        <div th:if="${#authorization.expression('hasAnyRole(''ADMIN'',''ORGANIZADOR'')')}">
            <a th:href="@{/eventos/nuevo}" class="btn btn-success">
                Nuevo Evento
            </a>
        </div>
    </div>

    <table class="table table-bordered table-striped shadow">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Descripción</th>
                <th>Fecha</th>
                <th>Capacidad</th>
                <th>Estado</th>

                <!-- SOLO ADMIN Y ORGANIZADOR -->
                <th th:if="${#authorization.expression('hasAnyRole(''ADMIN'',''ORGANIZADOR'')')}">
                    Acciones
                </th>
            </tr>
        </thead>

        <tbody>
            <tr th:each="evento : ${eventos}">
                <td th:text="${evento.id}"></td>
                <td th:text="${evento.nombre}"></td>
                <td th:text="${evento.descripcion}"></td>
                <td th:text="${evento.fecha}"></td>
                <td th:text="${evento.capacidad}"></td>
                <td th:text="${evento.activo ? 'Activo' : 'Inactivo'}"></td>

                <!-- SOLO ADMIN Y ORGANIZADOR -->
                <td th:if="${#authorization.expression('hasAnyRole(''ADMIN'',''ORGANIZADOR'')')}">

                    <a th:href="@{'/eventos/editar/' + ${evento.id}}"
                       class="btn btn-warning btn-sm">
                        Editar
                    </a>

                    <a th:href="@{'/eventos/eliminar/' + ${evento.id}}"
                       class="btn btn-danger btn-sm"
                       onclick="return confirm('¿Eliminar evento?')">
                        Eliminar
                    </a>

                </td>
            </tr>
        </tbody>
    </table>

    <div class="text-center mt-3">
        <a th:href="@{/}" class="btn btn-secondary">Volver</a>
    </div>

</div>

</body>
</html>
