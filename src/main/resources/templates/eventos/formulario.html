<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nuevo Evento</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2 class="text-center mb-4">Crear Evento</h2>

        <form th:action="@{/eventos/guardar}" th:object="${evento}" method="post">

            <div class="mb-3">
                <label>Nombre</label>
                <input type="text" th:field="*{nombre}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Descripción</label>
                <textarea th:field="*{descripcion}" class="form-control"></textarea>
            </div>

            <div class="mb-3">
                <label>Fecha</label>
                <input type="date" th:field="*{fecha}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Capacidad</label>
                <input type="number" th:field="*{capacidad}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Estado</label>
                <select th:field="*{activo}" class="form-control">
                    <option th:value="true">Activo</option>
                    <option th:value="false">Inactivo</option>
                </select>
            </div>

            <div class="text-center">
                <button type="submit" class="btn btn-success">Guardar</button>
                <a th:href="@{/eventos}" class="btn btn-secondary">Cancelar</a>
            </div>

        </form>

    </div>

</div>

</body>
</html>
