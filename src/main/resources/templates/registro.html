<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registro - Sistema Eventos</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card {
            background: white;
            padding: 30px;
            width: 400px;
            border-radius: 10px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.1);
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #28a745;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Registro de Usuario</h2>

    <form th:action="@{/guardarUsuario}" th:object="${usuario}" method="post">
        <input type="text" th:field="*{nombre}" placeholder="Nombre completo" required>
        <input type="email" th:field="*{email}" placeholder="Correo electrónico" required>
        <input type="password" th:field="*{password}" placeholder="Contraseña" required>
        <button type="submit">Registrarse</button>
    </form>

</div>

</body>
</html>
