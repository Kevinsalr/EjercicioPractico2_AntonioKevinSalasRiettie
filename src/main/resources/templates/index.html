<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Inicio - Sistema de Eventos</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand">Sistema de Eventos</span>

        <div class="d-flex align-items-center">
            <span class="text-white me-3"
                  th:text="'Usuario: ' + ${#authentication.name}"></span>

            <!-- LOGOUT CORRECTO -->
            <form th:action="@{/logout}" method="post" style="display:inline;">
                <button type="submit" class="btn btn-danger btn-sm">
                    Cerrar sesión
                </button>
            </form>
        </div>
    </div>
</nav>

<!-- CONTENIDO -->
<div class="container mt-5">

    <div class="text-center mb-4">
        <h2>Bienvenido</h2>
        <h5 th:text="'Rol: ' + ${#authentication.authorities}"></h5>
    </div>

    <div class="row justify-content-center">

        <!-- ADMIN -->
        <div class="col-md-4 mb-3"
             th:if="${#authorization.expression('hasRole(''ADMIN'')')}">

            <div class="card shadow text-center p-3">
                <h5>Gestión de Usuarios</h5>
                <a th:href="@{/usuarios}" class="btn btn-primary mt-2">
                    Ir
                </a>
            </div>

        </div>

        <div class="col-md-4 mb-3"
             th:if="${#authorization.expression('hasRole(''ADMIN'')')}">

            <div class="card shadow text-center p-3">
                <h5>Gestión de Roles</h5>
                <a th:href="@{/roles}" class="btn btn-dark mt-2">
                    Ir
                </a>
            </div>

        </div>

        <!-- ADMIN Y ORGANIZADOR -->
        <div class="col-md-4 mb-3"
             th:if="${#authorization.expression('hasAnyRole(''ADMIN'',''ORGANIZADOR'')')}">

            <div class="card shadow text-center p-3">
                <h5>Gestión de Eventos</h5>
                <a th:href="@{/eventos}" class="btn btn-warning mt-2">
                    Ir
                </a>
            </div>

        </div>

        <!-- TODOS -->
        <div class="col-md-4 mb-3">

            <div class="card shadow text-center p-3">
                <h5>Ver Eventos</h5>
                <a th:href="@{/eventos}" class="btn btn-success mt-2">
                    Ver
                </a>
            </div>

        </div>

        <div class="col-md-4 mb-3">

            <div class="card shadow text-center p-3">
                <h5>Consultas</h5>
                <a th:href="@{/eventos/buscar}" class="btn btn-info mt-2">
                    Ir
                </a>
            </div>

        </div>

    </div>

</div>

</body>
</html>
