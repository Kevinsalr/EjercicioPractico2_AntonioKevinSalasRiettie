<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Roles</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="d-flex justify-content-between mb-3">
        <h2>Lista de Roles</h2>

        <a th:href="@{/roles/nuevo}" class="btn btn-success">
            Nuevo Rol
        </a>
    </div>

    <table class="table table-bordered table-striped shadow">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Acciones</th>
            </tr>
        </thead>

        <tbody>
            <tr th:each="rol : ${roles}">
                <td th:text="${rol.id}"></td>
                <td th:text="${rol.nombre}"></td>

                <td>
                    <a th:href="@{'/roles/eliminar/' + ${rol.id}}"
                       class="btn btn-danger btn-sm"
                       onclick="return confirm('¿Eliminar rol?')">
                        Eliminar
                    </a>
                </td>
            </tr>
        </tbody>
    </table>

    <div class="text-center mt-3">
        <a th:href="@{/}" class="btn btn-secondary">Volver</a>
    </div>

</div>

</body>
</html>
